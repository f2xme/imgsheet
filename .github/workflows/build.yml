name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: imgsheet
            artifact_name: imgsheet-linux-x64
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: imgsheet
            artifact_name: imgsheet-macos-x64
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: imgsheet
            artifact_name: imgsheet-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: imgsheet.exe
            artifact_name: imgsheet-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          cp README.md "dist/${{ matrix.artifact_name }}/"
          if [ -f LICENSE ]; then
            cp LICENSE "dist/${{ matrix.artifact_name }}/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
